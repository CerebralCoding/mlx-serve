name: CI

# Build + test on every PR and main push. Mirrors the build/test portion of
# release.yml (same macos-26 runner, same steps, same mlx cache key — the two
# workflows share the self-built mlx stage) without signing/notarize/packaging.
#
# This is also the macOS 26.2 compatibility gate: dev machines may run newer
# macOS betas, but the shipped binaries must keep building and testing against
# the 26.x SDK the runner provides (build.zig targets os_version_min 26.2).

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: macos-26
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Select Xcode (Swift 6.1+ required by MCP swift-sdk)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install Zig (pinned nightly)
        run: |
          bash scripts/fetch-zig.sh
          echo "$GITHUB_WORKSPACE/.zig-toolchain" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: brew bundle install --file=Brewfile

      # Same key as release.yml so CI runs on main keep the cache warm for
      # release tag builds (and vice versa).
      - name: Compute mlx pin cache key
        id: mlxpin
        run: |
          echo "mlx=$(git -C lib/mlx-src rev-parse --short=12 HEAD)" >> "$GITHUB_OUTPUT"
          echo "mlxc=$(git -C lib/mlxc-src rev-parse --short=12 HEAD)" >> "$GITHUB_OUTPUT"
          echo "xcode=$(xcodebuild -version | tr ' \n' '--')" >> "$GITHUB_OUTPUT"

      - name: Cache self-built mlx + mlx-c
        uses: actions/cache@v4
        with:
          path: lib/mlx
          key: mlx-stage-${{ steps.mlxpin.outputs.mlx }}-${{ steps.mlxpin.outputs.mlxc }}-${{ steps.mlxpin.outputs.xcode }}

      - name: Build mlx + mlx-c (NAX-enabled)
        run: |
          # Xcode 26 ships the Metal compiler as a separate component; fetch it
          # if the image doesn't have it (build-mlx.sh hard-fails without it).
          xcrun -sdk macosx metal --version >/dev/null 2>&1 \
            || sudo xcodebuild -downloadComponent MetalToolchain
          bash scripts/build-mlx.sh

      - name: Fetch libllama (llama.cpp GGUF engine)
        run: bash scripts/fetch-llama.sh

      - name: Build mlx-serve (Zig, ReleaseFast)
        run: zig build -Doptimize=ReleaseFast

      - name: Build vz-agent guest binary
        run: zig build vz-agent

      - name: Smoke test mlx-serve binary
        run: |
          ./zig-out/bin/mlx-serve --version
          ./zig-out/bin/mlx-serve --help > /dev/null

      # Static guard: staged metallib contains the *_nax kernels, minos >= 26.2,
      # and the built binary links no leftover brew mlx/mlx-c.
      - name: Verify staged mlx (NAX kernels + minos)
        run: bash tests/test_mlx_staged_nax.sh

      - name: Run Zig tests
        run: zig build test --summary all

      # Swift 5 language mode: the swift-sdk pin needs it under Xcode 26's
      # Swift 6.3 or NetworkTransport.swift fails with SendingRisksDataRace
      # (matches app/build.sh + release.yml).
      - name: Build Swift app
        working-directory: app
        run: swift build -c release -Xswiftc -swift-version -Xswiftc 5

      - name: Run Swift tests
        working-directory: app
        run: swift test -Xswiftc -swift-version -Xswiftc 5
